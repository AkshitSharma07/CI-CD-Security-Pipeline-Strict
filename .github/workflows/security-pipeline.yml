name: Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: SAST - Bandit
  # ─────────────────────────────────────────────
  sast-bandit:
    name: SAST Scan (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST Scan
        run: |
          echo "Running Bandit SAST Scan"
          bandit -r . -ll -f json -o bandit-report.json

      # ✅ FIX: Always upload even if scan fails
      - name: Upload Bandit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json

  # ─────────────────────────────────────────────
  # JOB 2: Dependency Check - Safety
  # ─────────────────────────────────────────────
  dependency-check:
    name: Dependency Vulnerability Scan (Safety)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Safety
        run: pip install safety

      - name: Run Safety Dependency Scan
        run: |
          echo "Running Safety Dependency Check"
          safety check -r requirements.txt
          safety check -r requirements.txt --save-json safety-report.json

      # ✅ FIX: Always upload report
      - name: Upload Safety Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-dependency-report
          path: safety-report.json

  # ─────────────────────────────────────────────
  # JOB 3: Secrets Detection - TruffleHog
  # ─────────────────────────────────────────────
  secrets-scan:
    name: Secrets Detection (TruffleHog)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

  # ─────────────────────────────────────────────
  # JOB 4: Summary
  # ─────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast-bandit, dependency-check, secrets-scan]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "============================================="
          echo "         SECURITY PIPELINE SUMMARY"
          echo "============================================="
          echo "SAST Scan (Bandit):        ${{ needs.sast-bandit.result }}"
          echo "Dependency Check (Safety): ${{ needs.dependency-check.result }}"
          echo "Secrets Scan (TruffleHog): ${{ needs.secrets-scan.result }}"
          echo "============================================="
          echo "Review uploaded artifacts for full reports."
