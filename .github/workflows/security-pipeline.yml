name: Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: SAST - Static Application Security Testing
  # Tool: Bandit - scans Python code for vulnerabilities
  # ─────────────────────────────────────────────
  sast-bandit:
    name: SAST Scan (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST Scan
        run: |
          echo "==============================="
          echo "  Running Bandit SAST Scan"
          echo "==============================="
          bandit -r . -f json -o bandit-report.json 
          bandit -r . -ll 

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: bandit-report.json

  # ─────────────────────────────────────────────
  # JOB 2: Dependency Vulnerability Check
  # Tool: Safety - checks requirements.txt against CVE database
  # ─────────────────────────────────────────────
  dependency-check:
    name: Dependency Vulnerability Scan (Safety)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Safety
        run: pip install safety

      - name: Run Safety Dependency Scan
        run: |
          echo "==============================="
          echo "  Running Safety Dependency Check"
          echo "==============================="
          safety check -r requirements.txt --output text 
          safety check -r requirements.txt --save-json safety-report.json

      - name: Upload Safety Report
        uses: actions/upload-artifact@v4
        with:
          name: safety-dependency-report
          path: safety-report.json

  # ─────────────────────────────────────────────
  # JOB 3: Secrets Detection
  # Tool: TruffleHog - scans for hardcoded secrets, API keys, passwords
  # ─────────────────────────────────────────────
  secrets-scan:
    name: Secrets Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  

      - name: Run TruffleHog Secrets Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ─────────────────────────────────────────────
  # JOB 4: Security Summary Report
  # Runs after all scans, prints consolidated summary
  # ─────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast-bandit, dependency-check, secrets-scan]
    if: always()
    steps:
      - name: Print Summary
        run: |
          echo "============================================="
          echo "         SECURITY PIPELINE SUMMARY"
          echo "============================================="
          echo "SAST Scan (Bandit):        ${{ needs.sast-bandit.result }}"
          echo "Dependency Check (Safety): ${{ needs.dependency-check.result }}"
          echo "Secrets Scan (TruffleHog): ${{ needs.secrets-scan.result }}"
          echo "============================================="
          echo "Review uploaded artifacts for full reports."
